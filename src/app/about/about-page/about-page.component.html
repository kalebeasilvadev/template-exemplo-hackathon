@if (intro$ | async; as intro) {
	<section id="about" class="introduction scrollto pull-right">
		<main class="row clearfix" role="navigation">
			<main class="col-3" role="navigation">
				<main class="section-heading" role="navigation">
					<h2 class="section-title" aria-label="Título da seção" id="section-title">Título da seção</h2>
					<h2 class="section-title" aria-label="Título da seção" id="section-title">Título da seção</h2>
					<p class="section-subtitle" aria-label="Descrição da seção">Descrição da seção</p>
				</main>
			</main>
			@if (features$) {
				<main class="col-2-3" role="navigation">
					@for (feature of features$ | async; track feature; let i = $index) {
						<main class="col-3" role="navigation">
							<buttonpp-feature-block [feature]="feature" aria-label="Descrição do botão"></app-feature-block>
						</main>
					}
				</main>
			}
		</main>
	</section>
}
