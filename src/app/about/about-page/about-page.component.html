@if (intro$ | async; as intro) {
	<section id="about" class="introduction scrollto pull-right">
		<section class="row clearfix" role="navigation">
			<section class="col-3" role="navigation">
				<section class="section-heading" role="navigation">
					<h1 class="section-title" aria-label="Título da seção" id="section-title">Título da seção</h1>
					<h1 class="section-title" aria-label="Título da seção" id="section-title">Título da seção</h1>
					<h2 class="section-subtitle" aria-label="Descrição da seção">Descrição da seção</h2>
				</section>
			</section>
			@if (features$) {
				<section class="col-2-3" role="navigation">
					@for (feature of features$ | async; track feature; let i = $index) {
						<section class="col-3" role="navigation">
							<button [feature]="feature" aria-label="Descrição do botão"></app-feature-block>
						</section>
					}
				</section>
			}
		</section>
	</section>
}
