@if (intro$ | async; as intro) {
	<section id="about" class="introduction scrollto pull-right">
		<main class="row clearfix">
			<main class="col-3">
				<main class="section-heading">
					<h1 class="section-title">Título da seção</h1>
					<h1 class="section-title">Título da seção</h1>
					<p class="section-subtitle">Descrição da seção</p>
				</main>
			</main>
			@if (features$) {
				<main class="col-2-3">
					@for (feature of features$ | async; track feature; let i = $index) {
						<main class="col-3">
							<buttonpp-feature-block [feature]="feature"></app-feature-block>
						</main>
					}
				</main>
			}
		</main>
	</section>
}
