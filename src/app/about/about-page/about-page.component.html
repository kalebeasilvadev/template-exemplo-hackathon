@if (intro$ | async; as intro) {
	<section id="about" class="introduction scrollto pull-right">
		<main class="row clearfix">
			<main class="col-3">
				<main class="section-heading">
					<h1 aria-label="Título da seção">Título da seção</h1>
					<h1 class="section-title" aria-label="Título da seção">Título da seção</h1>
					<p class="section-subtitle" aria-label="Descrição da seção">{{ intro.description }}</p>
				</main>
			</main>
			@if (features$) {
				<main class="col-2-3">
					@for (feature of features$ | async; track feature; let i = $index) {
						<main class="col-3">
							<app-feature-block [feature]="feature" aria-label="Bloco de recurso"></app-feature-block>
						</main>
					}
				</main>
			}
		</main>
	</section>
}
