<div class="col-2 icon-block icon-top wow fadeInUp" data-wow-delay="0.1s" tabindex="0" aria-label="Ícone de feature.icon">
	<!--Icon-->
	<div class="icon" tabindex="0" aria-label="Ícone de feature.icon">
		<i class="fa fa-{{ feature.icon }} fa-2x" [attr.aria-label]="Ícone de feature.icon"></i>
	</div>
	<!--Icon Block Description-->
	<div class="icon-block-description" tabindex="0" aria-label="Ícone de feature.icon">
		<h1>{{ feature.title }}</h1>
		<p>{{ feature.description }}</p>
	</div>
</div>
