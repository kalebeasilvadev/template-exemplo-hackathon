<div class="col-2 icon-block icon-top wow fadeInUp" data-wow-delay="0.1s" tabindex="0" role="button" aria-label="Descrição do ícone">
	<!--Icon-->
	<div class="icon" tabindex="0" role="button" aria-label="Descrição do ícone">
		<i class="fa fa-{{ feature.icon }} fa-2x" aria-label="Ícone"></i>
	</div>
	<!--Icon Block Description-->
	<div class="icon-block-description" tabindex="0" role="button" aria-label="Descrição do ícone">
		<h1>{{ feature.title }}</h1>
		<p>{{ feature.description }}</p>
	</div>
</div>
