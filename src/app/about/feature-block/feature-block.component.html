<main class="col-2 icon-block icon-top wow fadeInUp" data-wow-delay="0.1s" tabindex="-1" aria-label="{{ feature.title }}">
	<!--Icon-->
	<main class="icon" tabindex="-1" aria-label="{{ feature.title }}">
		<h2 class="fa fa-{{ feature.icon }} fa-2x" aria-label="{{ feature.title }}" alt="Ícone de {{ feature.icon }}" tabindex="-1">Ícone de {{ feature.icon }}</h2>
	</main>
	<!--Icon Block Description-->
	<main class="icon-block-description" tabindex="-1" aria-label="{{ feature.title }}">
		<h1>{{ feature.title }}</h1>
		<p>Descrição simplificada da característica</p>
	</main>
</main>
