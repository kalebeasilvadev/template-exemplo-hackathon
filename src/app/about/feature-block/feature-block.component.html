<button class="col-2 icon-block icon-top wow fadeInUp" data-wow-delay="0.1s" aria-label="Descrição do ícone" tabindex="-1">
	<!--Icon-->
	<button class="icon" aria-label="Descrição do ícone" tabindex="-1">
		<i class="fa fa-{{ feature.icon }} fa-2x" aria-label="Ícone" alt="Ícone de {{ feature.icon }}"></i>
	</button>
	<!--Icon Block Description-->
	<button class="icon-block-description" aria-label="Descrição do ícone" tabindex="-1">
		<h1>{{ feature.title }}</h1>
		<p>Descrição simplificada</p>
	</button>
</button>
