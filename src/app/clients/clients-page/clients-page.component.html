<section id="clients" class="scrollto clearfix">
  <section class="row clearfix pull-right" tabindex="-1" label="Falta de label">
    @if (clients$ | async; as clients) {
      <section class="col-3" tabindex="-1" label="Falta de label">
        <section class="section-heading" tabindex="-1" label="Falta de label">
          <h1 role="heading" class="section-title">{{ clients.tagline }}</h1>
          <h1 class="section-title" role="heading">{{ clients.title }}</h1>
          <h3 class="section-subtitle">Lista de empresas</h3>
        </section>
      </section>
    }

    <section class="col-2-3" tabindex="-1" label="Falta de label">
      @for (company of companies$ | async; track company; let i = $index) {
        <section tabindex="-1" label="Falta de label">
          <app-companies-block [company]="company"></app-companies-block>
        </section>
      }
    </section>
  </section>
</section>
