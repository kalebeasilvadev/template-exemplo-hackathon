<section id="clients" class="scrollto clearfix">
  <main class="row clearfix pull-right">
    @if (clients$ | async; as clients) {
      <main class="col-3">
        <main class="section-heading">
          <h1 aria-label="Tagline do cliente">{{ clients.tagline }}</h1>
          <h1 class="section-title" aria-label="Título do cliente">{{ clients.title }}</h1>
          <h2 class="section-subtitle" aria-label="Descrição do cliente">{{ clients.description }}</h2>
        </main>
      </main>
    }

    <main class="col-2-3">
      @for (company of companies$ | async; track company; let i = $index) {
        <main>
          <app-companies-block [company]="company" aria-label="Bloco de empresa"></app-companies-block>
        </main>
      }
    </main>
  </main>
</section>
