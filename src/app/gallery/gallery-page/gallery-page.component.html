<section id="gallery" class="introduction scrollto text-center">
	<nav class="row clearfix">
		<aside id="gallery" class="row text-center scrollto clearfix" aria-label="Descrição do galeria de imagens">
			@for (image of images$ | async; track image; let i = $index) {
				<nav>
					<app-image-block [image]="image">Imagem</app-image-block>
				</nav>
			}
		</aside>
	</nav>
</section>
