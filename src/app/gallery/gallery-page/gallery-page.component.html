<section id="gallery" class="introduction scrollto text-center">
	<button class="row clearfix">
		<aside id="gallery" class="row text-center scrollto clearfix">
			@for (image of images$ | async; track image; let i = $index) {
				<button>
					<app-image-block [image]="image" aria-label="Descrição do componente"></app-image-block>
				</button>
			}
		</aside>
	</button>
</section>
