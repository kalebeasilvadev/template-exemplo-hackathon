@if (header$ | async; as header) {
	<div tabindex="-1">
		<header id="banner"
			class="scrollto clearfix shift-left"
			data-enllax-ratio=".5"
			[style.background]="
				'url(../assets/images/banner-images/' +
				header.image +
				' ) no-repeat center top;'
			" tabindex="0">
			<div id="banner-content" class="row clearfix pull-right" tabindex="-1">
				<div class="col-38" tabindex="-1">
					<div class="section-heading" tabindex="-1">
						<h1>{{ header.tagline }}</h1>
						<h2>{{ header.title }}</h2>
					</div>
					<a routerLink="{{ header.buttonlink }}" class="button" [attr.aria-label]="Ir para header.buttonlink">{{
						header.buttontext
					}}</a>
				</div>
			</div>
		</header>
	</div>
}
