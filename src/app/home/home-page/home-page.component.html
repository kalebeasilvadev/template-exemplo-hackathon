@if (header$ | async; as header) {
	<nav tabindex="-1" role="banner">
		<nav
			id="banner"
			class="scrollto clearfix shift-left"
			data-enllax-ratio=".5"
			[style.background]="
				'url(../assets/images/banner-images/' +
				header.image +
				' ) no-repeat center top;'
			" role="banner" tabindex="-1">
			<nav id="banner-content" class="row clearfix pull-right" tabindex="-1" role="banner">
				<nav class="col-38" tabindex="-1" role="banner">
					<nav class="section-heading" tabindex="-1" role="banner">
						<h1 aria-label="Tagline">Tagline</h1>
						<h1 aria-label="Título">{{ header.title }}</h1>
					</nav>
					<a routerLink="{{ header.buttonlink }}" class="button" aria-label="Botão" role="button">Botão</a>
				</nav>
			</nav>
		</nav>
	</nav>
}
