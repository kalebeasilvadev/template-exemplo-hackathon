<div id="header" class="nav-collapse nav-solid" tabindex="-1">
  <div class="row clearfix" tabindex="-1">
    <div class="col-1" tabindex="-1">
      <!--Logo-->
      <div id="logo" tabindex="-1">
        <!--Logo that is shown on the banner-->
        <img src="assets/images/logo.png" id="banner-logo" / aria-label="Elemento interativo" alt="Logotipo parcial com letras NAMARI">
        <!--End of Banner Logo-->

        <!--The Logo that is shown on the sticky Navigation Bar-->
        <img
          src="assets/images/logo-2.png"
          id="navigation-logo" / aria-label="Elemento interativo" alt="Logotipo NAMARI">
          <!--End of Navigation Logo-->
        </div>
        <!--End of Logo-->

        <!-- <aside>
        <app-social></app-social>
      </aside> -->

      <!--Main Navigation-->
      <nav id="nav-main" tabindex="0">
        <app-navmenu [menu]="menu" [menuOpen]="true"></app-navmenu>
      </nav>
      <!--End of Main Navigation-->

      <div id="nav-trigger" tabindex="-1">
        <span [class.open]="menuOpen === true"
          (onClick)="toggleMenu(!menuOpen)"
        (onKeyUp)="toggleMenu(!menuOpen)" aria-label="Elemento interativo"></span>
      </div>
      <nav id="nav-mobile" tabindex="0">
        @if (menuOpen === true) {
          <app-navmenu
            [menu]="menu"
            (menuStatus)="toggleMenu($event)"
          [menuOpen]="menuOpen"></app-navmenu>
        }
      </nav>
    </div>
  </div>
</div>
<!--End of Header-->
