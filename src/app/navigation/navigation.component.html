<nav id="header" class="nav-collapse nav-solid">
  <nav class="row clearfix">
    <nav class="col-1">
      <!--Logo-->
      <nav id="logo">
        <!--Logo that is shown on the banner-->
        <img src="assets/images/logo.png" id="banner-logo" alt="Landing Page" / aria-label="Elemento interativo">
        <!--End of Banner Logo-->

        <!--The Logo that is shown on the sticky Navigation Bar-->
        <img
          src="assets/images/logo-2.png"
          id="navigation-logo"
          alt="Landing Page" / aria-label="Elemento interativo">
          <!--End of Navigation Logo-->
        </nav>
        <!--End of Logo-->

        <!-- <aside>
        <app-social></app-social>
      </aside> -->

      <!--Main Navigation-->
      <nav id="nav-main">
        <app-navmenu [menu]="menu" [menuOpen]="true"></app-navmenu>
      </nav>
      <!--End of Main Navigation-->

      <nav id="nav-trigger">
        <button
          [class.open]="menuOpen === true"
          (onClick)="toggleMenu(!menuOpen)"
        (onKeyUp)="toggleMenu(!menuOpen)" aria-label="Abrir/fechar menu"></button>
      </nav>
      <nav id="nav-mobile">
        @if (menuOpen === true) {
          <app-navmenu
            [menu]="menu"
            (menuStatus)="toggleMenu($event)"
          [menuOpen]="menuOpen"></app-navmenu>
        }
      </nav>
    </nav>
  </nav>
</nav>
<!--End of Header-->
