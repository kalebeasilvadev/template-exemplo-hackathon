<ul [class.expanded]="menuOpen === true" aria-label="Menu" tabindex="-1">
	@for (menuItem of menu; track menuItem) {
		<li aria-label="Menu item {{menuItem.title}}">
			<ul
				routerLink="{{ menuItem.link }}"
				(click)="toggleMenu()"
				routerLinkActive="active"
				[routerLinkActiveOptions]="{ exact: true }"
				 aria-label="Menu item {{menuItem.title}}" tabindex="-1">{{ menuItem.title }}</a
			>
		</li>
	}
</ul>
