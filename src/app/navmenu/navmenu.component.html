<ul [class.expanded]="menuOpen === true">
	@for (menuItem of menu; track menuItem) {
		<li>
			<a routerLink="{{ menuItem.link }}"
				(click)="toggleMenu()"
				routerLinkActive="active"
				[routerLinkActiveOptions]="{ exact: true }" title="{{ menuItem.title }}">{{ menuItem.title }}</a
			>
		</li>
	}
</ul>
