<!--Pricing Block-->
<div
	class="pricing-block col-3 wow fadeInUp"
	data-wow-delay="0.4s"
	[class.featured]="plan.featured" tabindex="-1" href="{{ plan.buttonlink }}" aria-label="{{ plan.buttontext }}">
	<div class="pricing-block-content" tabindex="-1" href="{{ plan.buttonlink }}" aria-label="{{ plan.buttontext }}">
		<h1>{{ plan.title }}</h1>
		<p class="pricing-sub">Descrição do plano</p>
		<div class="pricing" tabindex="-1" href="{{ plan.buttonlink }}" aria-label="{{ plan.buttontext }}">
			<div class="price" tabindex="-1" href="{{ plan.buttonlink }}" aria-label="{{ plan.buttontext }}">
				<strong>{{ plan.currency }}</span
				>{{ plan.price }}
			</div>
			<p>Descrição do plano</p>
		</div>
		<ul>
			<li>{{ plan.downloads }}</li>
			<li>{{ plan.extensions }}</li>
			<li>{{ plan.tutorials }}</li>
			<li>{{ plan.support }}</li>
			<li>{{ plan.updates }}</li>
		</ul>
		<div href="{{ plan.buttonlink }}" class="button" aria-label="{{ plan.buttontext }}" tabindex="0">Clique para mais informações</div>
	</div>
</div>
<!--End Pricing Block-->
