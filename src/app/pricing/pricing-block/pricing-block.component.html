<!--Pricing Block-->
<div
	class="pricing-block col-3 wow fadeInUp"
	data-wow-delay="0.4s"
	[class.featured]="plan.featured">
	<div class="pricing-block-content">
		<h1>{{ plan.title }}</h1>
		<p class="pricing-sub">{{ plan.subtitle }}</p>
		<div class="pricing">
			<div class="price">
				<span>{{ plan.currency }}</span
				>{{ plan.price }}
			</div>
			<p>{{ plan.description }}</p>
		</div>
		<ul aria-label="Características deste plano" role="navigation">
			<li aria-label="Baixas ilimitadas">{{ plan.downloads }}</li>
			<li aria-label="Baixas ilimitadas">{{ plan.extensions }}</li>
			<li aria-label="Baixas ilimitadas">{{ plan.tutorials }}</li>
			<li aria-label="Baixas ilimitadas">{{ plan.support }}</li>
			<li aria-label="Baixas ilimitadas">{{ plan.updates }}</li>
		</ul>
		<a href="{{ plan.buttonlink }}" class="button" aria-label="Saiba mais sobre este plano" tabindex="0">{{ plan.buttontext }}</a>
	</div>
</div>
<!--End Pricing Block-->
