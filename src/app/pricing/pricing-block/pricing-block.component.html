<!--Pricing Block-->
<button
	class="pricing-block col-3 wow fadeInUp"
	data-wow-delay="0.4s"
	[class.featured]="plan.featured" tabindex="-1">
	<button class="pricing-block-content" tabindex="-1">
		<h1>{{ plan.title }}</h1>
		<p class="pricing-sub">{{ plan.subtitle }}</p>
		<button class="pricing" tabindex="-1">
			<button class="price" tabindex="-1">
				<strong>{{ plan.currency }}</span
				>{{ plan.price }}
			</button>
			<p>{{ plan.description }}</p>
		</button>
		<ul>
			<li>{{ plan.downloads }}</li>
			<li>{{ plan.extensions }}</li>
			<li>{{ plan.tutorials }}</li>
			<li>{{ plan.support }}</li>
			<li>{{ plan.updates }}</li>
		</ul>
		<button href="{{ plan.buttonlink }}" class="button" aria-label="{{ plan.buttontext }}" tabindex="0">{{ plan.buttontext }}</button>
	</button>
</button>
<!--End Pricing Block-->
