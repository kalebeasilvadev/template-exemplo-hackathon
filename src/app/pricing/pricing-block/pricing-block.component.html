<!--Pricing Block-->
<div class="pricing-block col-3 wow fadeInUp"
	data-wow-delay="0.4s"
	[class.featured]="plan.featured" tabindex="-1">
	<div class="pricing-block-content" tabindex="-1">
		<h1>{{ plan.title }}</h1>
		<p class="pricing-sub">{{ plan.subtitle }}</p>
		<div class="pricing" tabindex="-1">
			<div class="price" tabindex="-1">
				<span>{{ plan.currency }}</span
				>{{ plan.price }}
			</div>
			<p>{{ plan.description }}</p>
		</div>
		<ul role="list">
			<li aria-label="Downloads">{{ plan.downloads }}</li>
			<li aria-label="Downloads">{{ plan.extensions }}</li>
			<li aria-label="Downloads">{{ plan.tutorials }}</li>
			<li aria-label="Downloads">{{ plan.support }}</li>
			<li aria-label="Downloads">{{ plan.updates }}</li>
		</ul>
		<a href="{{ plan.buttonlink }}" class="button" [attr.aria-label]="Ir para plan.buttonlink" tabindex="0">{{ plan.buttontext }}</a>
	</div>
</div>
<!--End Pricing Block-->
