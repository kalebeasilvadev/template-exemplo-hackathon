<ul class="social-icons">
	@for (website of socialsites$ | async; track website; let i = $index) {
		<li>
			<button
				target="{{ website.target }}"
				title="{{ website.title }}"
				href="{{ website.link }}{{ website.username }}">
				<i class="fa fa-{{ website.icon }} fa-1x" alt="Ícone de {{ website.title }}"></i
				><i>{{ website.title }}</i>
			</button>
		</li>
	}
</ul>
