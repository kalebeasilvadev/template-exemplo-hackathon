<ul class="social-icons">
	@for (website of socialsites$ | async; track website; let i = $index) {
		<li>
			<a
				target="{{ website.target }}"
				title="{{ website.title }}"
				href="{{ website.link }}{{ website.username }}" aria-label="Título do site">
				<i class="fa fa-{{ website.icon }} fa-1x" alt="Ícone de {{ website.icon }}"></i
				><strong>{{ website.title }}</strong>
			</a>
		</li>
	}
</ul>
