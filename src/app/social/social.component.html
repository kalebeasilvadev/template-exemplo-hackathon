<ul class="social-icons">
	@for (website of socialsites$ | async; track website; let i = $index) {
		<li>
			<a target="{{ website.target }}"
				title="{{ website.title }}"
				href="{{ website.link }}{{ website.username }}" [attr.aria-label]="Link para website.title">
				<i class="fa fa-{{ website.icon }} fa-1x" [attr.aria-label]="Ícone de website.icon"></i
				><span>{{ website.title }}</span>
			</a>
		</li>
	}
</ul>
