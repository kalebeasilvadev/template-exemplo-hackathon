<aside id="testimonials"
	class="scrollto text-center pull-right pull-left"
	data-enllax-ratio=".2" aria-label="Testemunho">
	<div class="row clearfix" aria-label="Testemunho" tabindex="-1">
		@if (testimonials$ | async; as testimonial) {
			<div class="section-heading" aria-label="Testemunho" tabindex="-1">
				<h1 class="pull-down">{{ testimonial.tagline }}</h1>
				<h1 class="section-title">{{ testimonial.title }}</h1>
			</div>
		}

		<!--User Testimonial-->
		@for (feedback of feedback$ | async; track feedback; let i = $index) {
			<div aria-label="Testemunho" tabindex="-1">
				<app-feedback-block [feedback]="feedback"></app-feedback-block>
			</div>
		}
		<!-- End of Testimonial-->
	</div>
</aside>
