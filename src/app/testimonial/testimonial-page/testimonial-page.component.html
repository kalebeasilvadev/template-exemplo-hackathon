<aside
	id="testimonials"
	class="scrollto text-center pull-right pull-left"
	data-enllax-ratio=".2">
	<section class="row clearfix">
		@if (testimonials$ | async; as testimonial) {
			<section class="section-heading">
				<h1 class="pull-down" aria-label="Tagline do Testemunho">{{ testimonial.tagline }}</h1>
				<h1 class="section-title" aria-label="Título do Testemunho">{{ testimonial.title }}</h1>
			</section>
		}

		<!--User Testimonial-->
		@for (feedback of feedback$ | async; track feedback; let i = $index) {
			<section>
				<app-feedback-block [feedback]="feedback" aria-label="Bloco de Feedback">Comentário do usuário</app-feedback-block>
			</section>
		}
		<!-- End of Testimonial-->
	</section>
</aside>
